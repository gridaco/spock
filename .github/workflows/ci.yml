name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: uhura/web/pnpm-lock.yaml
      - name: build the canonical Uhura provider
        run: |
          pnpm -C uhura/web install --frozen-lockfile
          pnpm -C uhura/web build:provider
      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --locked --workspace
      - name: check the example
        run: cargo run --locked -p spock-cli -- check examples/instagram/v0.spock
      - name: check the canonical framework example
        run: cargo run --locked -p spock-cli -- check uhura/examples/instagram
      - name: check documentation snippets
        run: |
          cargo build --locked -p spock-cli
          SPOCK_BIN=target/debug/spock node scripts/check-doc-snippets.mjs

  uhura:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: uhura
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: uhura
          workspaces: uhura -> target
      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: uhura/web/pnpm-lock.yaml
      # Canonical host integration consumes the ignored provider bundle built
      # from authoritative TypeScript, so build browser products before Rust.
      - name: check the Uhura browser and provider
        run: |
          pnpm -C web install --frozen-lockfile
          pnpm -C web check
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --locked --workspace --all-targets
      - name: check the canonical Uhura project
        run: |
          cargo run --locked -p uhura-cli -- fmt --check examples/instagram/client
          cargo run --locked -p uhura-cli -- check examples/instagram/client --deny-warnings
          cargo run --locked -p uhura-cli -- trace examples/instagram/client --script=demo >/dev/null
