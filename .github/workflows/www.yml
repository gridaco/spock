name: www

on:
  push:
    branches: [main]
    paths:
      - "www/**"
      - "docs/**"
      - "uhura"
      - "scripts/build-www.sh"
      - "scripts/build-www-demo.sh"
      - "CHANGELOG.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "GOVERNANCE.md"
      - "editors/vscode/syntaxes/spock.tmLanguage.json"
      - ".github/workflows/www.yml"
      - ".gitmodules"
      - ".nvmrc"
      - ".vercelignore"
      - "vercel.json"
  pull_request:
    paths:
      - "www/**"
      - "docs/**"
      - "uhura"
      - "scripts/build-www.sh"
      - "scripts/build-www-demo.sh"
      - "CHANGELOG.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "GOVERNANCE.md"
      - "editors/vscode/syntaxes/spock.tmLanguage.json"
      - ".github/workflows/www.yml"
      - ".gitmodules"
      - ".nvmrc"
      - ".vercelignore"
      - "vercel.json"

permissions:
  contents: read

concurrency:
  group: www-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: |
            uhura/web/pnpm-lock.yaml
            www/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: www-uhura-demo
          workspaces: uhura -> target
          cache-directories: uhura/target/tools

      - name: install website dependencies
        run: |
          corepack pnpm@10.11.0 -C uhura/web install --frozen-lockfile
          corepack pnpm@10.11.0 -C www install --frozen-lockfile

      - name: build website from source
        run: bash scripts/build-www.sh
